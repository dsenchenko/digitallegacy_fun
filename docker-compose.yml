services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3456}:3456"
    environment:
      NODE_ENV: production
      PORT: 3456
      HOST: 0.0.0.0
      TRUST_PROXY: "true"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - obs-menu-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3456/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  obs-menu-data:
